<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blur"></div>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="logo-section">
                    <img src="hpe-logo.svg" alt="HPE Logo" class="hpe-logo">
                    <div class="logo-label">Task Manager</div>
                </div>
                <div class="header-controls">
                    <div class="date-time" id="dateTime"></div>
                    <button id="themeToggle" class="theme-toggle" title="Toggle dark/light theme">☀️</button>
                </div>
            </div>
            <div class="hpe-news" id="hpeNews">
                <div class="news-headline">Loading HPE news...</div>
            </div>
        </div>
        
        <div class="title-section">
            <h1>📋 My Tasks</h1>
            <p class="subtitle">Stay organized and productive</p>
        </div>
        
        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="✨ Add a new task..." 
                autocomplete="off"
            >
            <button id="addBtn" class="add-btn-primary">
                <span class="btn-icon">+</span>
                <span class="btn-text">Add</span>
            </button>
        </div>

        <div id="todoStats" class="todo-stats"></div>
        
        <ul id="todoList" class="todo-list">
            <!-- Todos will be added here -->
        </ul>

        <div id="emptyMessage" class="empty-message">
            <div class="empty-icon">📝</div>
            <p>No tasks yet. Add one to get started!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
